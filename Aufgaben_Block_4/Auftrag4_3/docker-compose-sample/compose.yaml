services:
  mongodb:
    image: mongo:4.2.0
    container_name: mongodb
    volumes:
      - mongo-data:/data/db
    networks:
      - backend-db-network

  backend:
    build:
      context: ./backend
    container_name: backend
    depends_on:
      - mongodb
    environment:
      - MONGO_URL=mongodb://mongodb:27017/appdb
      - MONGO_HOST=mongodb
      - MONGO_PORT=27017
    networks:
      - backend-db-network
      - frontend-backend-network

  frontend:
    build:
      context: ./frontend
    container_name: frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - frontend-backend-network

volumes:
  mongo-data:

networks:
  backend-db-network:
  frontend-backend-network:
